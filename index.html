<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Belanja Gadang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { box-shadow: 0 4px 10px rgba(0,0,0,0.08); border: none; border-radius: 12px; }
        .card-header { border-top-left-radius: 12px !important; border-top-right-radius: 12px !important; font-weight: 600; }
        .hidden-field { display: none; } 
        .small-text { font-size: 0.85rem; opacity: 0.9;}
        .form-label { font-size: 0.9rem; font-weight: 500; color: #495057; }
        .form-control, .form-select { border-radius: 8px; }
        .btn-primary { border-radius: 8px; padding: 10px; font-weight: 600; }
        .stat-value { font-weight: 700; letter-spacing: -0.5px; }
    </style>
</head>
<body>
    <div class="container mt-4 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <h2 class="mb-0 text-dark fw-bold">Dasbor Belanja Gadang</h2>
            <span class="badge bg-primary px-3 py-2">RN Site</span>
        </div>
        
        <div class="row mb-4">
            <div class="col-6 col-md-3 mb-3">
                <div class="card text-white bg-success h-100">
                    <div class="card-body p-3 d-flex flex-column justify-content-center">
                        <h6 class="card-title small-text mb-1">Saldo Awal</h6>
                        <h4 id="saldoText" class="stat-value mb-0">Rp 0</h4>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3 mb-3">
                <div class="card text-white bg-danger h-100">
                    <div class="card-body p-3 d-flex flex-column justify-content-center">
                        <h6 class="card-title small-text mb-1">Pengeluaran</h6>
                        <h4 id="pengeluaranText" class="stat-value mb-1">Rp 0</h4>
                        <small id="hutangText" class="fw-bold text-warning" style="font-size: 0.75rem;"></small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3 mb-3">
                <div class="card text-dark bg-warning h-100">
                    <div class="card-body p-3 d-flex flex-column justify-content-center">
                        <h6 class="card-title small-text mb-1 text-dark">Sisa Saldo</h6>
                        <h4 id="sisaSaldoText" class="stat-value mb-0">Rp 0</h4>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3 mb-3">
                <div class="card text-white bg-info h-100">
                    <div class="card-body p-3 d-flex flex-column justify-content-center">
                        <h6 class="card-title small-text mb-1">Estimasi Habis</h6>
                        <h4 id="runwayText" class="stat-value mb-1">- Hari</h4>
                        <small id="runwayDetail" style="font-size: 0.75rem; opacity: 0.9;">- Mgg | - Bln</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-5 mb-4">
                <div class="card h-100">
                    <div class="card-header bg-dark text-white">📝 Input Data Transaksi</div>
                    <div class="card-body bg-white">
                        <form id="formBelanja">
                            <div class="mb-4 pb-3 border-bottom">
                                <label class="form-label fw-bold text-dark">Kategori Transaksi</label>
                                <select class="form-select border-dark shadow-sm" id="kategori" onchange="toggleFields()" required>
                                    <option value="Pengeluaran">🔴 Pengeluaran (Belanja)</option>
                                    <option value="Pemasukan">🟢 Pemasukan (Isi Kas Awal)</option>
                                </select>
                            </div> 
                            <div class="row mb-4 pb-3 border-bottom">
                                <div class="col-6">
                                    <label class="form-label text-dark">Tanggal Transaksi</label>
                                    <input type="date" class="form-control shadow-sm" id="tanggalInput" required>
                                </div>
                                <div class="col-6">
                                    <label class="form-label text-dark">Hari</label>
                                    <input type="text" class="form-control bg-light" id="hariInput" readonly>
                                </div>
                            </div>

                            <div id="areaPemasukan" class="hidden-field mb-3 p-3 border border-success rounded bg-light">
                                <label class="form-label text-success fw-bold">Nominal Kas Awal (Rp)</label>
                                <input type="number" class="form-control border-success" id="kasAwal">
                            </div>

                            <div id="areaPengeluaran">
                                <div class="mb-3">
                                    <label class="form-label">Jenis Barang</label>
                                    <input type="text" class="form-control" id="jenisBarang">
                                </div>
                                <div class="row">
                                    <div class="col-6 mb-3">
                                        <label class="form-label">Berat</label>
                                        <input type="number" step="0.01" class="form-control" id="berat" oninput="hitungTotal()">
                                    </div>
                                    <div class="col-6 mb-3">
                                        <label class="form-label">Harga Satuan (Rp)</label>
                                        <input type="number" class="form-control" id="hargaSatuan" oninput="hitungTotal()">
                                    </div>
                                </div>
                                <div class="mb-3 p-2 bg-light border rounded">
                                    <label class="form-label fw-bold text-primary mb-1">Total Harga (Rp)</label>
                                    <input type="number" class="form-control border-primary text-primary fw-bold" id="totalHarga" readonly>
                                </div>
                                
                                <div class="row mt-4">
                                    <div class="col-12 mb-3">
                                        <label class="form-label fw-bold">📸 Upload Foto Timbangan</label>
                                        <input type="file" class="form-control" id="timbanganFoto" accept="image/*">
                                    </div>
                                    <div class="col-12 mb-3">
                                        <label class="form-label fw-bold">📸 Upload Foto Nota</label>
                                        <input type="file" class="form-control" id="notaFoto" accept="image/*">
                                    </div>
                                </div>
                            </div>

                            <div class="row border-top pt-3 mt-2">
                                <div class="col-6 mb-3">
                                    <label class="form-label">Metode Pembayaran</label>
                                    <select class="form-select" id="metode">
                                        <option value="Cash">Cash</option>
                                        <option value="Transfer">Transfer</option>
                                    </select>
                                </div>
                                <div class="col-6 mb-3">
                                    <label class="form-label">Status Bayar</label>
                                    <select class="form-select" id="status">
                                        <option value="Lunas">Lunas</option>
                                        <option value="Hutang">Hutang</option>
                                    </select>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 fw-bold mt-2 shadow-sm" id="btnSubmit">SIMPAN KE GOOGLE SHEETS</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-7 mb-4">
                <div class="card h-100">
                    <div class="card-header bg-dark text-white">📈 Grafik Tren Pengeluaran Harian</div>
                    <div class="card-body bg-white" style="min-height: 300px;">
                        <canvas id="expenseChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxAZH1i_RBG4C04K5AvU_sJTY_aAsDy1l2-ziJrvTKgas1IVDwGQsnH6hSqs37b-Qgggw/exec'; 
        
        let expenseChartInstance = null;

        // Fungsi Format Rupiah
        const formatRp = (angka) => {
            return new Intl.NumberFormat('id-ID', { 
                style: 'currency', 
                currency: 'IDR', 
                minimumFractionDigits: 0 
            }).format(angka);
        };

        // --- PERBAIKAN: Fungsi Update Hari ---
        function updateHari() {
            const tanggalValue = document.getElementById('tanggalInput').value;
            if (tanggalValue) {
                const date = new Date(tanggalValue);
                const hari = new Intl.DateTimeFormat('id-ID', { weekday: 'long' }).format(date);
                document.getElementById('hariInput').value = hari;
            }
        }

        document.getElementById('tanggalInput').addEventListener('change', updateHari);

        function toggleFields() {
            const kategori = document.getElementById('kategori').value;
            const areaPemasukan = document.getElementById('areaPemasukan');
            const areaPengeluaran = document.getElementById('areaPengeluaran');
            
            if (kategori === 'Pemasukan') {
                areaPemasukan.classList.remove('hidden-field');
                areaPengeluaran.classList.add('hidden-field');
            } else {
                areaPemasukan.classList.add('hidden-field');
                areaPengeluaran.classList.remove('hidden-field');
            }
        }
        
        function hitungTotal() {
            let berat = parseFloat(document.getElementById('berat').value) || 0;
            let hargaSatuan = parseFloat(document.getElementById('hargaSatuan').value) || 0;
            document.getElementById('totalHarga').value = Math.round(berat * hargaSatuan);
        }

        function loadDashboard() {
            fetch(SCRIPT_URL)
                .then(response => response.json())
                .then(data => {
                    let totalPemasukan = 0, totalPengeluaran = 0, totalHutang = 0;
                    let expensesByDate = {};
                    let firstDate = new Date();

                    data.forEach(row => {
                        let kasAwal = parseFloat(row['Kas Awal']) || 0;
                        let totalHarga = parseFloat(row['Total Harga']) || 0;
                        let dateObj = new Date(row['Tanggal']);

                        if (row['Kategori'] === 'Pemasukan') {
                            totalPemasukan += kasAwal;
                        } else {
                            totalPengeluaran += totalHarga;
                            if (row['Status'] === 'Hutang') totalHutang += totalHarga;
                            
                            let dateStr = dateObj.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
                            expensesByDate[dateStr] = (expensesByDate[dateStr] || 0) + totalHarga;
                        }
                    });

                    document.getElementById('saldoText').innerText = formatRp(totalPemasukan);
                    document.getElementById('pengeluaranText').innerText = formatRp(totalPengeluaran);
                    document.getElementById('sisaSaldoText').innerText = formatRp(totalPemasukan - totalPengeluaran);
                    document.getElementById('hutangText').innerText = totalHutang > 0 ? 'Hutang: ' + formatRp(totalHutang) : '';

                    renderChart(Object.keys(expensesByDate), Object.values(expensesByDate));
                })
                .catch(error => console.error('Error loading dashboard:', error));
        }

        function renderChart(labels, data) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            if (expenseChartInstance) { expenseChartInstance.destroy(); }
            expenseChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Pengeluaran (Rp)',
                        data: data,
                        backgroundColor: '#0d6efd',
                        borderRadius: 5
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        async function getBase64(file) {
            return new Promise((resolve) => {
                if (!file) return resolve("");
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
            });
        }

        document.getElementById('formBelanja').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.innerText = 'MEMPROSES...';
            btn.disabled = true;

            const postData = {
                tanggal: document.getElementById('tanggalInput').value,
                hari: document.getElementById('hariInput').value,
                kategori: document.getElementById('kategori').value,
                kas_awal: document.getElementById('kasAwal').value,
                jenis_barang: document.getElementById('jenisBarang').value,
                berat: document.getElementById('berat').value,
                harga_satuan: document.getElementById('hargaSatuan').value,
                total_harga: document.getElementById('totalHarga').value,
                metode_pembayaran: document.getElementById('metode').value,
                status: document.getElementById('status').value,
                timbangan_base64: await getBase64(document.getElementById('timbanganFoto').files[0]),
                nota_base64: await getBase64(document.getElementById('notaFoto').files[0])
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(postData)
            })
            .then(res => res.json())
            .then(result => {
                alert('Data Berhasil Disimpan!');
                this.reset();
                window.onload(); // Reset tanggal dan hari ke hari ini
                loadDashboard();
            })
            .catch(err => alert('Gagal mengirim data.'))
            .finally(() => {
                btn.innerText = 'SIMPAN KE GOOGLE SHEETS';
                btn.disabled = false;
            });
        });

        window.onload = function() {
            // Set default tanggal ke hari ini
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('tanggalInput').value = today;
            updateHari();
            toggleFields();
            loadDashboard();
        };
    </script>
</body>
</html>
